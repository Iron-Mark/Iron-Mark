<svg xmlns="http://www.w3.org/2000/svg" fill="none" aria-label="OpenCode" role="img" viewBox="0 0 300 300"><style>.opencode-light{display:block}.opencode-dark{display:none}@media (prefers-color-scheme:dark){.opencode-light{display:none}.opencode-dark{display:block}}</style><g class="opencode-light"><g><g clip-path="url(#opencode-light-clip)" transform="translate(30, 0)"><mask id="opencode-light-mask" width="240" height="300" x="0" y="0" maskUnits="userSpaceOnUse" style="mask-type:luminance"><path fill="#fff" d="M240 0H0V300H240V0Z"/></mask><g mask="url(#opencode-light-mask)"><path fill="#CFCECD" d="M180 240H60V120H180V240Z"/><path fill="#211E1E" d="M180 60H60V240H180V60ZM240 300H0V0H240V300Z"/></g></g></g></g><g class="opencode-dark"><g><g clip-path="url(#opencode-dark-clip)" transform="translate(30, 0)"><mask id="opencode-dark-mask" width="240" height="300" x="0" y="0" maskUnits="userSpaceOnUse" style="mask-type:luminance"><path fill="#fff" d="M240 0H0V300H240V0Z"/></mask><g mask="url(#opencode-dark-mask)"><path fill="#4B4646" d="M180 240H60V120H180V240Z"/><path fill="#F1ECEC" d="M180 60H60V240H180V60ZM240 300H0V0H240V300Z"/></g></g></g></g><defs><clipPath id="opencode-light-clip"><rect width="240" height="300" fill="#fff"/></clipPath><clipPath id="opencode-dark-clip"><rect width="240" height="300" fill="#fff"/></clipPath></defs></svg>