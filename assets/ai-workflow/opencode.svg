<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none" role="img" aria-label="OpenCode">
  <style>
    .opencode-light {
      display: block;
    }
    .opencode-dark {
      display: none;
    }
    @media (prefers-color-scheme: dark) {
      .opencode-light {
        display: none;
      }
      .opencode-dark {
        display: block;
      }
    }
  </style>
  <g class="opencode-light">
    <g transform="translate(30, 0)">
      <g clip-path="url(#opencode-light-clip)">
        <mask id="opencode-light-mask" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="240" height="300">
          <path d="M240 0H0V300H240V0Z" fill="white"/>
        </mask>
        <g mask="url(#opencode-light-mask)">
          <path d="M180 240H60V120H180V240Z" fill="#CFCECD"/>
          <path d="M180 60H60V240H180V60ZM240 300H0V0H240V300Z" fill="#211E1E"/>
        </g>
      </g>
    </g>
  </g>
  <g class="opencode-dark">
    <g transform="translate(30, 0)">
      <g clip-path="url(#opencode-dark-clip)">
        <mask id="opencode-dark-mask" style="mask-type:luminance" maskUnits="userSpaceOnUse" x="0" y="0" width="240" height="300">
          <path d="M240 0H0V300H240V0Z" fill="white"/>
        </mask>
        <g mask="url(#opencode-dark-mask)">
          <path d="M180 240H60V120H180V240Z" fill="#4B4646"/>
          <path d="M180 60H60V240H180V60ZM240 300H0V0H240V300Z" fill="#F1ECEC"/>
        </g>
      </g>
    </g>
  </g>
  <defs>
    <clipPath id="opencode-light-clip">
      <rect width="240" height="300" fill="white"/>
    </clipPath>
    <clipPath id="opencode-dark-clip">
      <rect width="240" height="300" fill="white"/>
    </clipPath>
  </defs>
</svg>
