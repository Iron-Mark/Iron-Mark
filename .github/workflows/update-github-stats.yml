name: Update GitHub Stats

# NOTE: GitHub Actions always runs a *scheduled* (and workflow_dispatch)
# event's workflow YAML from the repository's default branch (main), even
# though the `update-stats` job below explicitly checks out `ref: dev` for
# everything else. Keep this workflow's pipeline body simple/self-contained
# for that reason - anything more elaborate should live in a dev-checked-out
# script (see src/scripts/daily_freshness.py and bump-index-date.yml's
# equivalent note for why that matters).
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-github-stats.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        env:
          # Sum stars from the top ~100 repos only. Paginating every repository
          # blows GitHub's GraphQL node limit (RESOURCE_LIMITS_EXCEEDED) on large
          # accounts, which produces a "Something went wrong" error card.
          FETCH_MULTI_PAGE_STARS: "false"
        with:
          card: stats
          # Purple theme (#8B5CF6); hide rank/issues/contribs; stars + commits + PRs only
          options: username=Iron-Mark&show_icons=true&hide_border=true&include_all_commits=true&hide_rank=true&custom_title=Mark+Siazon+%40Iron-Mark&disable_animations=true&hide=issues,contribs&title_color=8B5CF6&icon_color=A78BFA&text_color=E5E7EB&bg_color=0B0F14&border_color=1F2937
          path: assets/github/stats.svg
          # Prefer a dedicated PAT (STATS_TOKEN); fall back to GITHUB_TOKEN. NOTE: a
          # token alone does NOT clear RESOURCE_LIMITS_EXCEEDED on this account (the
          # stats query cost is too high) — the guard step below ensures an error
          # card is never published.
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Keep last-good stats card if the API errored
        run: |
          # The stats card can return an error card ("Something went wrong" /
          # RESOURCE_LIMITS_EXCEEDED). Never publish that: restore the last committed
          # stats.svg and let the other cards refresh normally.
          if grep -qiE "Something went wrong|Resource limits for this query exceeded" assets/github/stats.svg; then
            echo "::warning::Stats card returned an error card; keeping the last committed stats.svg."
            git checkout -- assets/github/stats.svg
          else
            echo "Stats card generated successfully."
          fi

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          # Compact layout at card_width=320 (165px height to pair with stats card)
          options: username=Iron-Mark&layout=compact&langs_count=6&hide_progress=false&card_width=320&custom_title=Most+Used+Languages&disable_animations=true&hide_border=true&title_color=8B5CF6&icon_color=A78BFA&text_color=E5E7EB&bg_color=0B0F14&border_color=1F2937
          path: assets/github/top-langs.svg
          # Uses a dedicated PAT (STATS_TOKEN) so the stats/top-langs GraphQL
          # queries have enough API budget; the repo-scoped GITHUB_TOKEN hits
          # "Resource limits for this query exceeded" with include_all_commits.
          # Falls back to GITHUB_TOKEN if the secret is not set.
          token: ${{ secrets.STATS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Keep last-good top-langs card if the API errored
        run: |
          # Same failure mode as the stats card: an error card ("Something
          # went wrong" / RESOURCE_LIMITS_EXCEEDED) must never be published.
          if grep -qiE "Something went wrong|Resource limits for this query exceeded" assets/github/top-langs.svg; then
            echo "::warning::Top languages card returned an error card; keeping the last committed top-langs.svg."
            git checkout -- assets/github/top-langs.svg
          else
            echo "Top languages card generated successfully."
          fi

      - name: Generate contribution activity graph
        run: |
          curl -sL --fail "https://github-readme-activity-graph.vercel.app/graph?username=Iron-Mark&theme=react&bg_color=0B0F14&color=8B5CF6&line=8B5CF6&point=A78BFA&area=true&hide_border=true&height=180" \
            -o assets/github/activity-graph.svg

      - name: Generate contribution streak card
        run: |
          url="https://streak-stats.demolab.com/?user=Iron-Mark&theme=react&hide_border=true&background=0B0F14&ring=8B5CF6&fire=8B5CF6&currStreakLabel=A78BFA&sideLabels=A78BFA&currStreakNum=FFFFFF&sideNums=FFFFFF&dates=E5E7EB"
          for attempt in 1 2 3; do
            curl -sL "$url" -o assets/github/streak.svg
            if ! grep -q "Failed to retrieve contributions" assets/github/streak.svg; then
              exit 0
            fi
            echo "Attempt $attempt: streak-stats returned an error card, retrying..."
            sleep 10
          done
          # One flaky third party (streak-stats.demolab.com) must not fail the
          # whole run - keep the last committed streak.svg instead, same as
          # the stats-card and top-langs-card guards above.
          echo "::warning::streak-stats.demolab.com kept returning an error card after 3 attempts; keeping the last committed streak.svg."
          git checkout -- assets/github/streak.svg

      - name: Safety gate - reject hostile third-party SVGs
        run: |
          # Fetched SVGs come from third-party services. Never publish one
          # that carries active content - grep each of the 4 cards for
          # script/event-handler/foreignObject patterns; any hit reverts
          # just that file to the last committed (known-good) version.
          for f in assets/github/stats.svg assets/github/top-langs.svg assets/github/activity-graph.svg assets/github/streak.svg; do
            if grep -qiE '<script|onload=|onerror=|javascript:|<foreignObject' "$f"; then
              echo "::warning::$f contains disallowed active content (script/event-handler/foreignObject); keeping the last committed version."
              git checkout -- "$f"
            fi
          done

      - name: Staticize generated SVG cards
        run: python src/scripts/staticize_github_svgs.py

      - name: Open stats PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/github-stats-update"
          title="Update GitHub profile stats cards"
          body="Automated stats card refresh from the Update GitHub Stats workflow."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github/stats.svg assets/github/top-langs.svg assets/github/activity-graph.svg assets/github/streak.svg
          git diff --staged --quiet && echo "No changes" && exit 0
          git switch -c "$branch"
          git commit -m "$title"
          # Recreate the bot-owned branch from scratch each run. actions/checkout only
          # fetches `dev`, so there is no remote-tracking ref for this branch and
          # --force-with-lease rejects with "stale info". A plain force is safe here
          # because nothing else writes to this automation branch.
          git push --force origin "$branch"

          open_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$open_pr" ]; then
            gh pr edit "$open_pr" --title "$title" --body "$body"
          else
            gh pr create --base dev --head "$branch" --title "$title" --body "$body"
          fi

      - name: Auto-merge the stats PR into dev
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          branch="automation/github-stats-update"
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::STATS_TOKEN not set; the stats PR was opened but cannot be auto-merged. Leaving it for manual merge."
            exit 1
          fi
          pr=$(gh pr list --head "$branch" --base dev --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "No open PR to merge."
            exit 0
          fi
          # Bot PRs opened via GITHUB_TOKEN don't trigger required checks, so merge
          # past them with the PAT (repo admin). Card content is generated + low-risk.
          if gh pr merge "$pr" --merge --admin; then
            echo "Merged PR #$pr into dev."
          else
            echo "::error::Auto-merge of PR #$pr failed; leaving it for manual merge (STATS_TOKEN may need repo/public_repo scope)."
            exit 1
          fi

      - name: Alert on workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          title="Daily automation failure: Update GitHub Stats"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The **Update GitHub Stats** workflow failed.\n\nRun: %s\n\nThis issue is reused across failures until the workflow succeeds again.' "$run_url")

          existing=$(gh issue list --repo "${{ github.repository }}" --search "in:title \"$title\"" --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$existing" ] && [[ "$existing" =~ ^[0-9]+$ ]]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
            alerted=$?
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "$body"
            alerted=$?
          fi

          # gh issue calls fail outright if Issues are disabled for the repo.
          # Never let the alert step itself add a confusing second failure -
          # fall back to a job summary entry so the failure is still visible.
          if [ "${alerted:-1}" != "0" ]; then
            echo "::warning::Could not post a GitHub Issue alert (Issues may be disabled for this repository); see the job summary instead."
            { echo "## $title"; echo; echo "$body"; } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
