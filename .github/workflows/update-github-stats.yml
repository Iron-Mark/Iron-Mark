name: Update GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-github-stats.yml

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=Iron-Mark&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&hide_rank=true
          path: assets/github/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated widgets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github/stats.svg
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update GitHub profile stats card"
          git push
