name: Bump index dates

# NOTE: GitHub Actions always runs a *scheduled* (and workflow_dispatch)
# event's workflow YAML from the repository's default branch (main), even
# though the `bump` job below explicitly checks out `ref: dev` for
# everything else. That means this YAML file is always main's copy on a
# schedule - only the checked-out scripts (src/scripts/*.py) reflect dev.
# The pipeline body (derive -> bump dates -> regenerate -> validate) is
# consolidated into src/scripts/daily_freshness.py for exactly this reason:
# so the pipeline's actual shape lives on dev with the scripts it drives,
# and this file only needs to invoke it as a single step.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bump-index-date.yml"
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The daily schedule runs on main (default branch), but the freshness PR
          # targets dev. Build the bot branch FROM dev so it can never conflict
          # with it (same fix as update-github-stats.yml).
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run daily freshness pipeline (derive, bump dates, regenerate, validate)
        run: python3 src/scripts/daily_freshness.py

      - name: Open freshness PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/bump-index-freshness"
          title="chore: bump index freshness dates"
          body="Automated freshness update from the Bump index dates workflow."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llms-index.json robots.txt sitemap.xml public/FAQ.md public/PROOF.md public/RECRUITER.md src/data/portfolio-feed.snapshot.json public/llms-full.txt public/llms-ctx-full.txt public/schema/llms-index.schema.json public/schema/person.jsonld public/schema/faq.jsonld docs/index.html src/portfolio-sync/marksiazon-dev-llms-snippet.md src/portfolio-sync/faq-crosslinks.md
          git diff --staged --quiet && echo "No date changes" && exit 0
          git switch -c "$branch"
          git commit -m "$title"
          # Recreate the bot-owned branch each run. actions/checkout only fetches the
          # triggering branch, so there's no remote-tracking ref and --force-with-lease
          # rejects with "stale info"; a plain force is safe for this automation branch.
          git push --force origin "$branch"

          open_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$open_pr" ]; then
            gh pr edit "$open_pr" --title "$title" --body "$body"
          else
            # Target dev: enforce-pr-flow rejects PRs into main that don't come from
            # dev, so freshness updates flow dev -> main via the normal promotion.
            gh pr create --base dev --head "$branch" --title "$title" --body "$body"
          fi
          gh workflow run validate-index.yml --ref "$branch" || true

      - name: Auto-merge the freshness PR into dev
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          branch="automation/bump-index-freshness"
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::STATS_TOKEN not set; the freshness PR was opened but cannot be auto-merged. Leaving it for manual merge."
            exit 1
          fi
          pr=$(gh pr list --head "$branch" --base dev --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "No open PR to merge."
            exit 0
          fi
          # Bot PRs opened via GITHUB_TOKEN don't trigger required checks, so merge
          # past them with the PAT (repo admin). Files are already validated above.
          if gh pr merge "$pr" --merge --admin; then
            echo "Merged PR #$pr into dev."
          else
            echo "::error::Auto-merge of PR #$pr failed; leaving it for manual merge (STATS_TOKEN may need repo/public_repo scope)."
            exit 1
          fi

      - name: Alert on workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Daily automation failure: Bump index dates"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The **Bump index dates** workflow failed.\n\nRun: %s\n\nThis issue is reused across failures until the workflow succeeds again.' "$run_url")

          existing=$(gh issue list --repo "${{ github.repository }}" --search "in:title \"$title\"" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "$body"
          fi
