name: Bump index dates

on:
  push:
    branches: [main]
    paths:
      - "llms-index.json"
      - "llms.txt"
      - "public/llms-full.txt"
      - "public/llms-ctx-full.txt"
      - "public/FAQ.md"
      - "public/RECRUITER.md"
      - "public/PROOF.md"
      - "public/STACK.md"
      - "public/PROFILE.md"
      - "public/README.md"
      - "public/HOW-TO-CITE.md"
      - "public/LICENSE.md"
      - "public/CITATION.cff"
      - "humans.txt"
      - "robots.txt"
      - "sitemap.xml"
      - "public/schema/**"
      - "README.md"
      - "docs/index.html"
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The daily schedule runs on main (default branch), but the freshness PR
          # targets dev. Build the bot branch FROM dev so it can never conflict
          # with it (same fix as update-github-stats.yml).
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Derive narrative content from portfolio feed
        run: python3 src/scripts/derive_from_portfolio.py

      - name: Bump updated and lastmod dates
        run: python3 src/scripts/bump_index_dates.py

      - name: Regenerate derived files
        run: |
          # Regenerate until the tree is stable. Bumped dates change the manifest
          # files, which shifts the sha256 hashes embedded in person.jsonld and
          # docs/index.html, so a single pass is not always a fixpoint and would
          # leave drift that fails `Validate index`.
          for pass in 1 2 3 4 5; do
            python3 src/scripts/generate_llms_ctx.py
            python3 src/scripts/generate_sitemap.py
            python3 src/scripts/generate_schema.py
            python3 src/scripts/build_pages_index.py
            python3 src/scripts/generate_portfolio_sync.py
            if git diff --quiet; then
              echo "Derived files stable after pass $pass."
              break
            fi
            git add -A
          done

      - name: Validate
        run: python3 src/scripts/validate_index.py

      - name: Open freshness PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/bump-index-freshness"
          title="chore: bump index freshness dates"
          body="Automated freshness update from the Bump index dates workflow."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add llms-index.json robots.txt sitemap.xml public/FAQ.md public/PROOF.md public/RECRUITER.md src/data/portfolio-feed.snapshot.json public/llms-full.txt public/llms-ctx-full.txt public/schema/llms-index.schema.json public/schema/person.jsonld public/schema/faq.jsonld docs/index.html src/portfolio-sync/marksiazon-dev-llms-snippet.md src/portfolio-sync/faq-crosslinks.md
          git diff --staged --quiet && echo "No date changes" && exit 0
          git switch -c "$branch"
          git commit -m "$title"
          # Recreate the bot-owned branch each run. actions/checkout only fetches the
          # triggering branch, so there's no remote-tracking ref and --force-with-lease
          # rejects with "stale info"; a plain force is safe for this automation branch.
          git push --force origin "$branch"

          open_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$open_pr" ]; then
            gh pr edit "$open_pr" --title "$title" --body "$body"
          else
            # Target dev: enforce-pr-flow rejects PRs into main that don't come from
            # dev, so freshness updates flow dev -> main via the normal promotion.
            gh pr create --base dev --head "$branch" --title "$title" --body "$body"
          fi
          gh workflow run validate-index.yml --ref "$branch" || true

      - name: Auto-merge the freshness PR into dev
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          branch="automation/bump-index-freshness"
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "STATS_TOKEN not set; leaving the PR for manual merge."
            exit 0
          fi
          pr=$(gh pr list --head "$branch" --base dev --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            echo "No open PR to merge."
            exit 0
          fi
          # Bot PRs opened via GITHUB_TOKEN don't trigger required checks, so merge
          # past them with the PAT (repo admin). Files are already validated above.
          if gh pr merge "$pr" --merge --admin; then
            echo "Merged PR #$pr into dev."
          else
            echo "::warning::Auto-merge of PR #$pr failed; leaving it for manual merge (STATS_TOKEN may need repo/public_repo scope)."
          fi
