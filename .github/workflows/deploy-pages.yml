name: Deploy GitHub Pages mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate derived files
        run: |
          python3 src/scripts/generate_readme_intelligence.py
          python3 src/scripts/generate_llms_ctx.py
          python3 src/scripts/generate_schema.py
          python3 src/scripts/build_pages_index.py
          python3 src/scripts/generate_sitemap.py
          python3 src/scripts/generate_portfolio_sync.py

      - name: Validate source metadata
        run: python3 src/scripts/validate_index.py

      - name: Build docs mirror
        run: |
          mkdir -p docs
          for f in llms.txt llms-index.json humans.txt robots.txt sitemap.xml; do
            cp "$f" "docs/$f"
          done
          for f in README.md FAQ.md RECRUITER.md PROOF.md PROFILE.md STACK.md HOW-TO-CITE.md LICENSE.md CITATION.cff llms-full.txt llms-ctx-full.txt readme-intelligence.json; do
            cp "public/$f" "docs/$f"
          done
          rm -rf docs/assets
          cp -r assets docs/
          rm -rf docs/schema
          cp -r public/schema docs/
          python3 src/scripts/build_pages_mirror.py

      - name: Validate docs mirror
        run: python3 src/scripts/validate_pages_mirror.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
