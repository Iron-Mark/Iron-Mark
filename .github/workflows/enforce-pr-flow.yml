name: Enforce PR Flow

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  enforce-pr-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch promotion path
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -eu

          # PRs into dev are unrestricted.
          if [ "$BASE_REF" != "main" ]; then
            echo "Branch flow accepted: $HEAD_REF -> $BASE_REF"
            exit 0
          fi

          # PRs into main must come from dev, or from an allowed bot branch that can't
          # route through dev (external automation that targets the default branch).
          case "$HEAD_REF" in
            dev|imgbot|automation/*|dependabot/*)
              echo "Branch flow accepted: $HEAD_REF -> main"
              ;;
            *)
              echo "::error::Pull requests into main must come from dev (or an allowed bot branch: imgbot, automation/*, dependabot/*)."
              exit 1
              ;;
          esac
