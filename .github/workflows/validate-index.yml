name: Validate index

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev, cursor/**]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate llms-ctx-full and check drift
        run: |
          python3 src/scripts/generate_llms_ctx.py
          git diff --exit-code public/llms-ctx-full.txt || (
            echo "::error::public/llms-ctx-full.txt is out of date - run src/scripts/generate_llms_ctx.py"
            exit 1
          )

      - name: Regenerate schema graphs and check drift
        run: |
          python3 src/scripts/generate_schema.py
          git diff --exit-code public/schema/person.jsonld public/schema/faq.jsonld || (
            echo "::error::Schema JSON-LD is out of date - run src/scripts/generate_schema.py"
            exit 1
          )

      - name: Build Pages index and check drift
        run: |
          python3 src/scripts/build_pages_index.py
          git diff --exit-code docs/index.html || (
            echo "::error::docs/index.html is out of date - run src/scripts/build_pages_index.py"
            exit 1
          )

      - name: Generate sitemap and check drift
        run: |
          python3 src/scripts/generate_sitemap.py
          git diff --exit-code sitemap.xml || (
            echo "::error::sitemap.xml is out of date - run src/scripts/generate_sitemap.py"
            exit 1
          )

      - name: Generate portfolio sync snippets and check drift
        run: |
          python3 src/scripts/generate_portfolio_sync.py
          git diff --exit-code src/portfolio-sync/marksiazon-dev-llms-snippet.md src/portfolio-sync/faq-crosslinks.md || (
            echo "::error::Portfolio sync snippets are out of date - run src/scripts/generate_portfolio_sync.py"
            exit 1
          )

      - name: Check derived regions match snapshot
        run: python3 src/scripts/derive_from_portfolio.py --check

      - name: Run derive unit tests
        run: python3 -m unittest src.scripts.test_derive_from_portfolio

      - name: Validate llms-index, assets, schema, and crawl files
        run: python3 src/scripts/validate_index.py

      - name: Validate Pages mirror artifact
        run: python3 src/scripts/validate_pages_mirror.py

      - name: Validate local links
        run: python3 src/scripts/link_qa.py --local-only

      - name: Validate JSON
        run: |
          python3 -m json.tool llms-index.json > /dev/null
          python3 -m json.tool public/schema/llms-index.schema.json > /dev/null
          python3 -m json.tool public/schema/person.jsonld > /dev/null
          python3 -m json.tool public/schema/faq.jsonld > /dev/null

      - name: Alert on workflow failure
        # Only alert for push/schedule/dispatch runs (e.g. dev or main
        # broke), not for pull_request runs - a failing PR check is already
        # visible on the PR itself and doesn't need a duplicate issue.
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          title="Daily automation failure: Validate index"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body=$(printf 'The **Validate index** workflow failed outside of a pull request (ref: %s).\n\nRun: %s\n\nThis issue is reused across failures until the workflow succeeds again.' "${{ github.ref }}" "$run_url")

          existing=$(gh issue list --repo "${{ github.repository }}" --search "in:title \"$title\"" --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$existing" ] && [[ "$existing" =~ ^[0-9]+$ ]]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
            alerted=$?
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "$body"
            alerted=$?
          fi

          # gh issue calls fail outright if Issues are disabled for the repo.
          # Never let the alert step itself add a confusing second failure -
          # fall back to a job summary entry so the failure is still visible.
          if [ "${alerted:-1}" != "0" ]; then
            echo "::warning::Could not post a GitHub Issue alert (Issues may be disabled for this repository); see the job summary instead."
            { echo "## $title"; echo; echo "$body"; } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
